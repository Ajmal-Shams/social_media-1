<!DOCTYPE html>
<html lang="en">

<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CircleUp</title>
    <link rel="stylesheet" href="{% static 'sass/vender/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'sass/vender/bootstrap.min.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="{% url 'home' %}">CircleUp  Report Control</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarText">
          <ul class="navbar-nav mr-auto">
            <li class="nav-item active">
              <a class="nav-link" href="{% url 'home' %}"> <span class="sr-only"></span></a>
            </li>
            
          </ul>
          
        </div>
      </nav>
      <center>
<div class="card shadow" style="width: 36rem;">

  <form method="post">{% csrf_token %}
    <div class="form-group">
      <label for="staticEmail" class="col-sm-2 col-form-label">User</label>
      <div class="col-sm-10">
        <input type="text" name="user" readonly class="form-control-plaintext" id="staticEmail" value={{user1}}>
      </div>
    </div>
    <div class="form-group">
      <label for="staticEmail" class="col-sm-2 col-form-label">Comment</label>
      <div class="col-sm-10">
        <textarea style="border: black;  border-style: inset; border-width: 2px;" type="text" rows="5" cols="24" name="comment" readonly class="form-control-plaintext" id="staticEmail" >{{comment}}</textarea>
      </div>
    </div>
    <div class="form-group">
      <label for="staticEmail" class="col-sm-2 col-form-label">FeedBack</label>
      <div class="col-sm-10">
        <textarea style="border: black;  border-style: inset; border-width: 2px;" type="text"  class="form-control-plaintext" id="staticEmail" name="feedback"></textarea>
      </div>
    </div>
    <br>
    <input type="submit" class="btn btn-danger">
    <br>
  </form>
</div>
</center>
  </body>
