<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CircleUp</title> 
    <link rel="stylesheet" href="{% static 'sass/vender/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'sass/vender/bootstrap.min.css' %}">
    
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css' %}" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous"> -->
    <link rel="stylesheet" href="{% static 'sass/main.css' %}">
</head>
<body>
    <div class="container">
        <div class="sign_up">
            <div class="content">
                <div class="log-on border_insc">
                    <div class="logo">
                        <img src="{% static 'images/logo.jpg' %}">
                        <p><b>Start your visual diary today! Sign up now and turn your moments into memories.</b></p>


                    </div>
                    <form action="" method="post">{% csrf_token %}
                        {% if error_message %}
                        <div class="alert alert-danger" role="alert" style="margin-bottom: 10px;">
                            {{ error_message }}
                        </div>
                        {% endif %}
                        <div>
                            <input type="email" name="email" id="emai" placeholder="email address">
                        </div>
                        <div>
                            <input type="text" name="name" id="name" placeholder="Full Name">
                        </div>
                        <div>
                            <input type="text" name="username" id="username" placeholder="Username">
                        </div>
                        <div>
                            <input type="password" name="password" id="password" placeholder="password">
                        </div>
                        <div>
                            <label for="dob" class="form-label">Date of Birth</label>
                            <input type="date" name="dob" id="dob" class="form-control" required>
                        </div>
                        <div class="info">
    
                            <p>
                                By signing up, you agree to our 
                                <a href="terms.html">Terms, Privacy Policy and Cookies Policy.</a> 
                            </p>
                        </div>
                        
                   
                    <a href="{% url 'home' %}">
                        <button type="submit" class="log_btn">
                                Sign Up
                        </button>
                    </form>
                    </a>
                </div>
                <div class="sing-in border_insc">
                    <p>
                        Have an account? 
                        <a href="{% url 'login' %}">Log in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.7/dist/umd/popper.min.js" integrity="sha384-zYPOMqeu1DAVkHiLqWBUTcbYfZ8osu1Nd6Z89ify25QV9guujx43ITvfi12/QExE" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.min.js" integrity="sha384-Y4oOpwW3duJdCWv5ly8SCFYWqFDsfob/3GkgExXKV4idmbt98QcxXYs9UoXAB7BZ" crossorigin="anonymous"></script>
       
   
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script> -->
</body>
</html>
